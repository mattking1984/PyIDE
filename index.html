<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyIDE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#ffffff;--bg1:#f5f5f3;--bg2:#e8e8e4;
  --tx0:#1a1a18;--tx1:#444441;--tx2:#888780;
  --bd:#c8c7c0;--bd2:#aaa9a0;
  --green:#1D9E75;--green2:#0F6E56;
  --blue:#185FA5;--blue2:#0C447C;
  --red:#D85A30;--red2:#993C1D;
  --amber:#BA7517;
  --mono:'Courier New',monospace;
  --hl-kw:#8B0000;--hl-bi:#0057AE;--hl-str:#007272;
  --hl-num:#C65D09;--hl-cmt:#737373;
  --hl-word:rgba(100,100,220,0.15);--hl-bkt:rgba(255,170,0,0.4);
}
.dark{
  --bg0:#1a1a18;--bg1:#242422;--bg2:#2e2e2b;
  --tx0:#e8e8e4;--tx1:#a8a8a2;--tx2:#66665e;
  --bd:#3a3a36;--bd2:#4a4a46;
  --hl-kw:#FF8080;--hl-bi:#6BB5FF;--hl-str:#7EC8A0;
  --hl-num:#FFB347;--hl-cmt:#888888;
  --hl-word:rgba(100,100,220,0.25);--hl-bkt:rgba(255,170,0,0.3);
}
html,body{height:100%;font-family:system-ui,sans-serif;background:#f0f0ee}
#app{display:flex;flex-direction:column;height:100vh;background:var(--bg0);color:var(--tx0)}
#toolbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg1);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
.tl-title{font-size:13px;font-weight:500;color:var(--tx0);flex:1;min-width:80px}
.tl-btn{background:var(--bg0);color:var(--tx0);border:1px solid var(--bd);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.tl-btn:hover{background:var(--bg2);border-color:var(--bd2)}
.tl-btn.on{background:var(--bg2);border-color:var(--bd2);font-weight:500}
#run-btn{background:var(--green);color:#fff;border:none;border-radius:7px;padding:5px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
#run-btn:hover{background:var(--green2)}
#run-btn:disabled{background:var(--bg2);color:var(--tx2);border:1px solid var(--bd);cursor:default}
#stop-btn{background:var(--red2);color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:13px;cursor:pointer;font-family:inherit;display:none}
#stop-btn:hover{background:#4A1B0C}
#workspace{display:flex;flex:1;overflow:hidden}
#workspace.stacked{flex-direction:column}
#workspace.side{flex-direction:row}
#ed-panel{display:flex;flex-direction:column;overflow:hidden;flex:1}
#workspace.stacked #ed-panel{border-bottom:1px solid var(--bd)}
#workspace.side #ed-panel{border-right:1px solid var(--bd)}
#ed-row{display:flex;flex:1;overflow:hidden}
#lnum{padding:10px 0;background:var(--bg1);min-width:36px;flex-shrink:0;overflow:hidden;border-right:1px solid var(--bd);user-select:none}
.ln{font-family:var(--mono);font-size:13px;color:var(--tx2);text-align:right;padding:0 7px;line-height:21px}
#ed-wrap{position:relative;flex:1;overflow:auto}
#highlight{position:relative;display:block;min-width:100%;padding:10px;margin:0;border:none;font-family:var(--mono);font-size:13px;line-height:21px;white-space:pre-wrap;word-break:break-word;pointer-events:none;box-sizing:border-box;color:var(--tx0);tab-size:4;-moz-tab-size:4}
#editor{position:absolute;top:0;left:0;width:100%;padding:10px;border:none;outline:none;resize:none;font-family:var(--mono);font-size:13px;line-height:21px;background:transparent;color:transparent;caret-color:var(--tx0);tab-size:4;-moz-tab-size:4;box-sizing:border-box;overflow:hidden;-webkit-user-select:text;spellcheck:false}
#editor::selection{background:rgba(100,149,237,0.3)}
.hl-kw{color:var(--hl-kw);font-weight:600}
.hl-bi{color:var(--hl-bi)}
.hl-str{color:var(--hl-str)}
.hl-num{color:var(--hl-num)}
.hl-cmt{color:var(--hl-cmt);font-style:italic}
.hl-word{background:var(--hl-word);border-radius:2px}
.hl-bkt{background:var(--hl-bkt);border-radius:2px;font-weight:bold}
.hl-ph{color:var(--tx2)}
#out-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg0)}
#workspace.stacked #out-panel{height:220px;flex-shrink:0}
#workspace.side #out-panel{width:300px;flex-shrink:0}
#out-hdr{display:flex;align-items:center;padding:6px 10px;background:var(--bg1);border-bottom:1px solid var(--bd);flex-shrink:0}
#out-hdr span{font-size:11px;font-weight:500;color:var(--tx1);text-transform:uppercase;letter-spacing:.05em;flex:1}
#clr-out{font-size:11px;color:var(--tx1);cursor:pointer;background:var(--bg0);border:1px solid var(--bd);border-radius:5px;font-family:inherit;padding:2px 8px}
#clr-out:hover{background:var(--bg2);color:var(--tx0)}
#out-body{flex:1;overflow-y:auto;padding:10px 12px;font-family:var(--mono);font-size:13px;line-height:1.7}
.o{display:inline;white-space:pre-wrap;word-break:break-word;color:var(--tx0)}
.o.err{color:var(--red)}
.o.prompt{color:var(--blue)}
.inline-inp{font-family:var(--mono);font-size:13px;line-height:1.7;border:none;border-bottom:1px solid var(--tx2);outline:none;background:transparent;color:var(--tx0);padding:0;margin:0;min-width:8ch;vertical-align:baseline;-webkit-user-select:text}
#files-panel{display:none;flex-direction:column;border-right:1px solid var(--bd);width:180px;flex-shrink:0;background:var(--bg1);overflow:hidden}
#files-hdr{display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
#files-hdr span{font-size:11px;font-weight:500;color:var(--tx1);text-transform:uppercase;letter-spacing:.05em;flex:1}
#new-file-btn{font-size:20px;line-height:1;color:var(--green);cursor:pointer;background:none;border:none;padding:0 2px;font-weight:500}
#files-list{flex:1;overflow-y:auto;padding:4px}
.file-item{display:flex;align-items:center;padding:6px 8px;border-radius:6px;cursor:pointer;gap:6px;margin-bottom:2px;border:1px solid transparent}
.file-item:hover{background:var(--bg2)}
.file-item.active{background:var(--bg2);border-color:var(--bd)}
.fi-name{font-size:13px;color:var(--tx0);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.fi-del{font-size:13px;color:var(--tx2);cursor:pointer;background:none;border:none;padding:0;line-height:1;flex-shrink:0}
.fi-del:hover{color:var(--red)}
#no-files{font-size:12px;color:var(--tx2);padding:10px 8px;font-style:italic}
#statusbar{display:flex;align-items:center;gap:6px;padding:4px 12px;background:var(--bg1);border-top:1px solid var(--bd);flex-shrink:0}
#sdot{width:7px;height:7px;border-radius:50%;background:var(--tx2);flex-shrink:0}
#sdot.ready{background:var(--green)}
#sdot.running{background:var(--amber)}
#sdot.error{background:var(--red)}
#smsg{font-size:11px;color:var(--tx2)}
#toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);background:#FAECE7;color:var(--red2);border:1px solid var(--red);border-radius:7px;padding:6px 14px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:20;white-space:nowrap}
#toast.show{opacity:1}
#rename-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center;z-index:30}
#rename-overlay.show{display:flex}
#rename-box{background:var(--bg0);border:1px solid var(--bd2);border-radius:10px;padding:16px;width:280px;display:flex;flex-direction:column;gap:10px}
#rename-box label{font-size:13px;color:var(--tx0);font-weight:500}
#rename-input{font-size:13px;border:1px solid var(--bd2);border-radius:6px;padding:6px 8px;background:var(--bg0);color:var(--tx0);outline:none;font-family:inherit}
#rename-input:focus{border-color:var(--blue)}
#rename-btns{display:flex;gap:8px;justify-content:flex-end}
.rb{border-radius:6px;padding:5px 14px;font-size:13px;cursor:pointer;font-family:inherit}
#rename-ok{background:var(--blue);color:#fff;border:none}
#rename-ok:hover{background:var(--blue2)}
#rename-cancel{background:var(--bg0);color:var(--tx1);border:1px solid var(--bd)}
#rename-cancel:hover{background:var(--bg2)}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="tl-title">PyIDE</span>
    <button class="tl-btn" id="btn-files" onclick="toggleFiles()">Files</button>
    <button class="tl-btn on" id="btn-stack" onclick="setLayout('stacked')">Stacked</button>
    <button class="tl-btn" id="btn-side" onclick="setLayout('side')">Side by side</button>
    <button class="tl-btn" id="btn-dark" onclick="toggleDark()">Dark</button>
    <button class="tl-btn" onclick="exportFile()">Export .py</button>
    <button id="stop-btn" onclick="stopCode()">Stop</button>
    <button id="run-btn" disabled onclick="runCode()">Loading...</button>
  </div>

  <div id="workspace" class="stacked" style="position:relative">
    <div id="files-panel">
      <div id="files-hdr">
        <span>My files</span>
        <button id="new-file-btn" onclick="newFile()" title="New file">+</button>
      </div>
      <div id="files-list"></div>
    </div>

    <div id="ed-panel">
      <div id="ed-row">
        <div id="lnum"><div class="ln">1</div></div>
        <div id="ed-wrap">
          <pre id="highlight" aria-hidden="true"></pre>
          <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="none" autocomplete="off"></textarea>
        </div>
      </div>
    </div>

    <div id="out-panel">
      <div id="out-hdr">
        <span>Output</span>
        <button id="clr-out" onclick="clearOutput()">clear</button>
      </div>
      <div id="out-body"></div>
    </div>
  </div>

  <div id="statusbar">
    <span id="sdot"></span>
    <span id="smsg">Loading Python runtime...</span>
  </div>
</div>

<div id="toast">Paste disabled - type your own code</div>

<div id="rename-overlay">
  <div id="rename-box">
    <label>File name</label>
    <input id="rename-input" type="text" maxlength="40"/>
    <div id="rename-btns">
      <button class="rb" id="rename-cancel" onclick="closeRename()">Cancel</button>
      <button class="rb" id="rename-ok" onclick="confirmRename()">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script>
let pyodide=null, inputResolve=null, running=false;
let currentFile=null, renameTarget=null, dark=false, filesOpen=false;
const STORE='pyide_files';

const app=document.getElementById('app');
const editor=document.getElementById('editor');
const edWrap=document.getElementById('ed-wrap');
const hlPre=document.getElementById('highlight');
const lnum=document.getElementById('lnum');
const outBody=document.getElementById('out-body');
const runBtn=document.getElementById('run-btn');
const stopBtn=document.getElementById('stop-btn');
const toast=document.getElementById('toast');
const sdot=document.getElementById('sdot');
const smsg=document.getElementById('smsg');
const filesList=document.getElementById('files-list');
const renameOverlay=document.getElementById('rename-overlay');
const renameInput=document.getElementById('rename-input');
const filesPanel=document.getElementById('files-panel');

// ── Syntax highlighting ───────────────────────────────────────────────────────

const KW = new Set(['False','None','True','and','as','assert','async','await',
  'break','class','continue','def','del','elif','else','except','finally',
  'for','from','global','if','import','in','is','lambda','nonlocal','not',
  'or','pass','raise','return','try','while','with','yield']);

const BI = new Set(['print','input','int','float','str','bool','len','range',
  'list','dict','tuple','set','frozenset','type','abs','max','min','sum',
  'sorted','reversed','enumerate','zip','map','filter','open','isinstance',
  'issubclass','hasattr','getattr','setattr','repr','format','round','pow',
  'divmod','hex','oct','bin','chr','ord','id','hash','vars','dir','next',
  'iter','callable','any','all','object','super','property','staticmethod',
  'classmethod','Exception','ValueError','TypeError','IndexError','KeyError',
  'AttributeError','NameError','StopIteration','RuntimeError','print']);

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function tokenize(code){
  const toks=[];
  let i=0;
  while(i<code.length){
    // comment
    if(code[i]==='#'){
      let j=code.indexOf('\n',i);
      if(j<0) j=code.length;
      toks.push({s:i,e:j,t:'cmt'});
      i=j; continue;
    }
    // triple string
    if(i+2<code.length){
      const q3=code.slice(i,i+3);
      if(q3==='"""'||q3==="'''"){
        let j=i+3;
        while(j<=code.length-3){
          if(code.slice(j,j+3)===q3){j+=3;break;}
          j++;
        }
        if(j>code.length-3) j=code.length;
        toks.push({s:i,e:j,t:'str'});
        i=j; continue;
      }
    }
    // single-line string
    if(code[i]==='"'||code[i]==="'"){
      const q=code[i];
      let j=i+1;
      while(j<code.length&&code[j]!==q&&code[j]!=='\n'){
        if(code[j]==='\\') j++;
        j++;
      }
      toks.push({s:i,e:j+1,t:'str'});
      i=j+1; continue;
    }
    // number
    if(/[0-9]/.test(code[i])||(code[i]==='.'&&i+1<code.length&&/[0-9]/.test(code[i+1]))){
      let j=i;
      while(j<code.length&&/[0-9._eExXoObBjJ]/.test(code[j])) j++;
      toks.push({s:i,e:j,t:'num'});
      i=j; continue;
    }
    // identifier / keyword / builtin
    if(/[a-zA-Z_]/.test(code[i])){
      let j=i;
      while(j<code.length&&/[a-zA-Z0-9_]/.test(code[j])) j++;
      const w=code.slice(i,j);
      toks.push({s:i,e:j,t:KW.has(w)?'kw':BI.has(w)?'bi':'id'});
      i=j; continue;
    }
    // bracket
    if('([{)]}'.includes(code[i])){
      toks.push({s:i,e:i+1,t:'bkt'});
      i++; continue;
    }
    // default (single char)
    toks.push({s:i,e:i+1,t:'def'});
    i++;
  }
  return toks;
}

function findBracketMatch(toks,code,pos,dir){
  const opens='([{',closes=')]}';
  const ch=code[pos];
  const target=dir>0?closes[opens.indexOf(ch)]:opens[closes.indexOf(ch)];
  const bkts=toks.filter(t=>t.t==='bkt');
  const idx=bkts.findIndex(t=>t.s===pos);
  if(idx<0) return -1;
  let depth=1, j=idx+dir;
  while(j>=0&&j<bkts.length){
    const bc=code[bkts[j].s];
    if(bc===ch) depth++;
    else if(bc===target){depth--;if(depth===0) return bkts[j].s;}
    j+=dir;
  }
  return -1;
}

function buildHighlight(code, cursor){
  if(!code) return '<span class="hl-ph"># Start coding here...\n# Your work saves automatically.</span> ';

  const toks=tokenize(code);

  // word at cursor (identifiers only)
  let hlWord=null;
  if(cursor>=0){
    let ws=cursor,we=cursor;
    while(ws>0&&/\w/.test(code[ws-1])) ws--;
    while(we<code.length&&/\w/.test(code[we])) we++;
    if(we>ws){
      const w=code.slice(ws,we);
      if(/[a-zA-Z_]/.test(w[0])) hlWord=w;
    }
  }

  // bracket match
  let bktA=-1,bktB=-1;
  if(cursor>=0){
    const opens='([{',closes=')]}';
    let brPos=-1,brDir=0;
    const c0=code[cursor]||'',c1=cursor>0?code[cursor-1]:'';
    if(opens.includes(c0)){brPos=cursor;brDir=1;}
    else if(opens.includes(c1)){brPos=cursor-1;brDir=1;}
    else if(closes.includes(c0)){brPos=cursor;brDir=-1;}
    else if(closes.includes(c1)){brPos=cursor-1;brDir=-1;}
    if(brPos>=0){
      bktB=findBracketMatch(toks,code,brPos,brDir);
      if(bktB>=0) bktA=brPos;
    }
  }

  let html='';
  for(const tok of toks){
    const txt=code.slice(tok.s,tok.e);
    const esc=escHtml(txt);
    if(tok.t==='bkt'){
      if(tok.s===bktA||tok.s===bktB) html+=`<span class="hl-bkt">${esc}</span>`;
      else html+=esc;
    } else if(tok.t==='id'&&hlWord&&txt===hlWord){
      html+=`<span class="hl-word">${esc}</span>`;
    } else if(tok.t==='kw'){
      html+=`<span class="hl-kw">${esc}</span>`;
    } else if(tok.t==='bi'){
      html+=`<span class="hl-bi">${esc}</span>`;
    } else if(tok.t==='str'){
      html+=`<span class="hl-str">${esc}</span>`;
    } else if(tok.t==='num'){
      html+=`<span class="hl-num">${esc}</span>`;
    } else if(tok.t==='cmt'){
      html+=`<span class="hl-cmt">${esc}</span>`;
    } else {
      html+=esc;
    }
  }
  html+=' ';
  return html;
}

function updateHighlight(){
  const cursor=(document.activeElement===editor)?editor.selectionStart:-1;
  hlPre.innerHTML=buildHighlight(editor.value,cursor);
  const h=hlPre.offsetHeight;
  editor.style.height=h+'px';
}

// ── UI helpers ────────────────────────────────────────────────────────────────

function setStatus(s,m){sdot.className=s;smsg.textContent=m}

function applyButtonColors(){
  const isDark=app.classList.contains('dark');
  document.querySelectorAll('.tl-btn').forEach(btn=>{
    btn.style.background=isDark?'#2e2e2b':'#ffffff';
    btn.style.color=isDark?'#e8e8e4':'#1a1a18';
    btn.style.borderColor=isDark?'#3a3a36':'#c8c7c0';
  });
  const c=document.getElementById('clr-out');
  c.style.background=isDark?'#2e2e2b':'#ffffff';
  c.style.color=isDark?'#a8a8a2':'#444441';
  c.style.borderColor=isDark?'#3a3a36':'#c8c7c0';
}

function toggleDark(){
  dark=!dark;
  app.classList.toggle('dark',dark);
  document.getElementById('btn-dark').textContent=dark?'Light':'Dark';
  document.getElementById('btn-dark').classList.toggle('on',dark);
  applyButtonColors();
}

function setLayout(m){
  document.getElementById('workspace').className=m;
  document.getElementById('btn-stack').classList.toggle('on',m==='stacked');
  document.getElementById('btn-side').classList.toggle('on',m==='side');
}

function toggleFiles(){
  filesOpen=!filesOpen;
  filesPanel.style.display=filesOpen?'flex':'none';
  document.getElementById('btn-files').classList.toggle('on',filesOpen);
  if(filesOpen) renderFiles();
}

// ── File management ───────────────────────────────────────────────────────────

function getFiles(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch{return{}}}
function saveFiles(f){localStorage.setItem(STORE,JSON.stringify(f))}
function genId(){return 'f'+Date.now()}

function loadFile(id){
  const files=getFiles();
  if(!files[id]) return;
  currentFile=id;
  editor.value=files[id].code||'';
  updateLnum();
  updateHighlight();
  renderFiles();
  clearOutput();
}

function saveCurrentCode(){
  if(!currentFile) return;
  const files=getFiles();
  if(!files[currentFile]) return;
  files[currentFile].code=editor.value;
  files[currentFile].updated=Date.now();
  saveFiles(files);
}

function newFile(){
  const files=getFiles();
  const id=genId();
  const count=Object.keys(files).length+1;
  files[id]={name:'program_'+count+'.py',code:'',created:Date.now(),updated:Date.now()};
  saveFiles(files);
  loadFile(id);
}

function deleteFile(id,e){
  e.stopPropagation();
  const files=getFiles();
  delete files[id];
  saveFiles(files);
  if(currentFile===id){
    currentFile=null;
    editor.value='';
    updateLnum();
    updateHighlight();
    clearOutput();
    const remaining=Object.keys(files);
    if(remaining.length) loadFile(remaining[remaining.length-1]);
  }
  renderFiles();
}

function openRename(id,e){
  e.stopPropagation();
  renameTarget=id;
  const files=getFiles();
  renameInput.value=files[id]?files[id].name.replace(/\.py$/,''):'';
  renameOverlay.classList.add('show');
  setTimeout(()=>renameInput.focus(),50);
}

function closeRename(){renameOverlay.classList.remove('show');renameTarget=null}

function confirmRename(){
  if(!renameTarget) return;
  const files=getFiles();
  if(!files[renameTarget]) return;
  let name=renameInput.value.trim()||'untitled';
  if(!name.endsWith('.py')) name+='.py';
  files[renameTarget].name=name;
  saveFiles(files);
  renderFiles();
  closeRename();
}

renameInput.addEventListener('keydown',e=>{
  if(e.key==='Enter') confirmRename();
  if(e.key==='Escape') closeRename();
});

function renderFiles(){
  const files=getFiles();
  const keys=Object.keys(files).sort((a,b)=>(files[b].updated||0)-(files[a].updated||0));
  if(!keys.length){
    filesList.innerHTML='<div id="no-files">No files yet. Hit + to create one.</div>';
    return;
  }
  filesList.innerHTML='';
  keys.forEach(id=>{
    const f=files[id];
    const div=document.createElement('div');
    div.className='file-item'+(id===currentFile?' active':'');
    div.innerHTML=`<span class="fi-name" onclick="loadFile('${id}')">${f.name}</span><button class="fi-del" onclick="openRename('${id}',event)" title="Rename">&#9998;</button><button class="fi-del" onclick="deleteFile('${id}',event)" title="Delete">&#10005;</button>`;
    filesList.appendChild(div);
  });
}

// ── Editor events ─────────────────────────────────────────────────────────────

function updateLnum(){
  const n=editor.value.split('\n').length;
  lnum.innerHTML=Array.from({length:n},(_,i)=>`<div class="ln">${i+1}</div>`).join('');
}

let saveTimer=null;
editor.addEventListener('input',()=>{
  updateLnum();
  updateHighlight();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    if(!currentFile){
      const files=getFiles();
      const id=genId();
      files[id]={name:'program_1.py',code:editor.value,created:Date.now(),updated:Date.now()};
      saveFiles(files);
      currentFile=id;
      if(filesOpen) renderFiles();
    } else {
      saveCurrentCode();
      if(filesOpen) renderFiles();
    }
  },800);
});

// sync line numbers with editor scroll
edWrap.addEventListener('scroll',()=>{lnum.scrollTop=edWrap.scrollTop});

editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+4;
    updateLnum();
    updateHighlight();
  }
  if(e.key==='Enter'&&!e.ctrlKey&&!e.metaKey){
    e.preventDefault();
    const s=editor.selectionStart;
    const text=editor.value;
    const lineStart=text.lastIndexOf('\n',s-1)+1;
    const currentLine=text.slice(lineStart,s);
    const indent=currentLine.match(/^(\s*)/)[1];
    const extra=currentLine.trimEnd().endsWith(':')?'    ':'';
    const insert='\n'+indent+extra;
    editor.value=text.slice(0,s)+insert+text.slice(editor.selectionEnd);
    editor.selectionStart=editor.selectionEnd=s+insert.length;
    updateLnum();
    updateHighlight();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter') runCode();
});

// update bracket match and word highlight on cursor move
editor.addEventListener('keyup',()=>updateHighlight());
editor.addEventListener('click',()=>updateHighlight());
editor.addEventListener('focus',()=>updateHighlight());
editor.addEventListener('blur',()=>updateHighlight());

editor.addEventListener('paste',e=>{
  const text=(e.clipboardData||window.clipboardData).getData('text');
  const cur=editor.value;
  if(text&&text.length>3&&!cur.includes(text.trim().slice(0,30))){
    e.preventDefault();
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2000);
  }
});

editor.addEventListener('contextmenu',e=>e.preventDefault());

// ── Output / input ────────────────────────────────────────────────────────────

function appendOut(text,cls){
  if(!text) return;
  const s=document.createElement('span');
  s.className='o'+(cls?' '+cls:'');
  s.textContent=text;
  outBody.appendChild(s);
  outBody.scrollTop=outBody.scrollHeight;
}

function clearOutput(){outBody.innerHTML=''}

window._pyInput=function(prompt){
  return new Promise(resolve=>{
    inputResolve=resolve;
    if(prompt) appendOut(prompt,'prompt');
    const inp=document.createElement('input');
    inp.type='text';
    inp.className='inline-inp';
    inp.autocorrect='off';
    inp.autocapitalize='none';
    inp.autocomplete='off';
    inp.spellcheck=false;
    inp.style.width='10ch';
    outBody.appendChild(inp);
    outBody.scrollTop=outBody.scrollHeight;
    inp.focus();
    inp.addEventListener('input',()=>{
      inp.style.width=Math.max(10,inp.value.length+2)+'ch';
    });
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const val=inp.value;
        inp.remove();
        appendOut(val+'\n');
        if(inputResolve){inputResolve(val);inputResolve=null}
      }
    });
    inp.addEventListener('paste',e=>e.preventDefault());
    inp.addEventListener('contextmenu',e=>e.preventDefault());
  });
};

function stopCode(){
  running=false;
  const inp=outBody.querySelector('.inline-inp');
  if(inp) inp.remove();
  if(inputResolve){inputResolve('');inputResolve=null}
  runBtn.style.display='';
  stopBtn.style.display='none';
  setStatus('ready','Stopped');
}

function exportFile(){
  const name=currentFile?getFiles()[currentFile]?.name||'program.py':'program.py';
  const blob=new Blob([editor.value],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Python runner ─────────────────────────────────────────────────────────────

function checkInfiniteLoops(code){
  // Strip strings and comments to avoid false positives
  const s=code
    .replace(/#[^\n]*/g,'')
    .replace(/"""[\s\S]*?"""/g,'""')
    .replace(/'''[\s\S]*?'''/g,"''")
    .replace(/"(?:[^"\\]|\\.)*"/g,'""')
    .replace(/'(?:[^'\\]|\\.)*'/g,"''");

  const hasBreak=/\bbreak\b/.test(s);

  // while True: or while 1: with no break anywhere
  if(/\bwhile\s+(True|1)\s*:/.test(s)&&!hasBreak){
    return(
      "Infinite loop detected!\n"+
      "  'while True:' runs forever unless the loop contains a 'break' statement.\n"+
      "  Either add a break, or use a condition that can become False (e.g. while score < 10:)."
    );
  }

  // Constant comparison: while x == x: / while 0 == 0: etc.
  const m=s.match(/\bwhile\s+(\w+)\s*(==|<=|>=)\s*\1\s*:/);
  if(m){
    return(
      "Infinite loop detected!\n"+
      `  'while ${m[1]} ${m[2]} ${m[1]}:' is always True — this loop will never stop.\n`+
      "  Change the condition to something that can eventually become False."
    );
  }

  return null;
}

function formatTraceback(raw){
  return raw
    .replace(/Traceback \(most recent call last\):\n/g,'')
    .replace(/  File "<exec>", /g,'  ')
    .replace(/  File "<string>", /g,'  ')
    .replace(/  File "<student>", /g,'  ')
    .trim();
}

async function runCode(){
  if(!pyodide||running) return;
  running=true;
  clearOutput();
  saveCurrentCode();
  runBtn.style.display='none';
  stopBtn.style.display='';
  setStatus('running','Running...');

  pyodide.globals.set('_out',(t)=>appendOut(t));
  pyodide.globals.set('_err',(t)=>appendOut(t,'err'));
  pyodide.globals.set('_pyInput',(p)=>window._pyInput(p));

  try{
    await pyodide.runPythonAsync(`
import sys, io, builtins, js, ast

class _Out(io.StringIO):
    def write(self, s):
        if s: _out(s)
        return len(s)
    def flush(self): pass

class _Err(io.StringIO):
    def write(self, s):
        if s: _err(s)
        return len(s)
    def flush(self): pass

sys.stdout = _Out()
sys.stderr = _Err()

async def _input(prompt=''):
    val = await _pyInput(str(prompt))
    return str(val)

builtins.input = _input

def _make_async(code_str):
    tree = ast.parse(code_str)
    func_deps = {}
    input_callers = set()

    class _Scan(ast.NodeVisitor):
        def __init__(self):
            self._stack = []
        def visit_FunctionDef(self, node):
            self._stack.append(node.name)
            func_deps.setdefault(node.name, set())
            self.generic_visit(node)
            self._stack.pop()
        visit_AsyncFunctionDef = visit_FunctionDef
        def visit_Call(self, node):
            if self._stack:
                fn = self._stack[-1]
                func_deps.setdefault(fn, set())
                if isinstance(node.func, ast.Name):
                    if node.func.id == 'input':
                        input_callers.add(fn)
                    else:
                        func_deps[fn].add(node.func.id)
            self.generic_visit(node)

    _Scan().visit(tree)

    needs_async = set(input_callers)
    changed = True
    while changed:
        changed = False
        for fn, deps in func_deps.items():
            if fn not in needs_async and deps & needs_async:
                needs_async.add(fn)
                changed = True

    class _Fix(ast.NodeTransformer):
        def visit_FunctionDef(self, node):
            self.generic_visit(node)
            if node.name not in needs_async:
                return node
            new_node = ast.AsyncFunctionDef(
                name=node.name, args=node.args, body=node.body,
                decorator_list=node.decorator_list, returns=node.returns,
                type_comment=getattr(node, 'type_comment', None)
            )
            return ast.copy_location(new_node, node)
        def visit_Call(self, node):
            self.generic_visit(node)
            if isinstance(node.func, ast.Name) and (
                    node.func.id == 'input' or node.func.id in needs_async):
                return ast.copy_location(ast.Await(value=node), node)
            return node

    fixed = _Fix().visit(tree)
    wrapper = ast.parse("async def _main(): pass")
    wrapper.body[0].body = fixed.body or [ast.Pass()]
    ast.fix_missing_locations(wrapper)
    return compile(wrapper, "<student>", "exec")
`);
  }catch(err){
    appendOut('Internal error: '+String(err)+'\n','err');
    setStatus('error','Error');
    running=false;
    runBtn.style.display='';
    stopBtn.style.display='none';
    return;
  }

  // Static pre-check: warn about obvious infinite loops
  const infiniteLoopWarning = checkInfiniteLoops(editor.value);
  if(infiniteLoopWarning){
    appendOut(infiniteLoopWarning+'\n','err');
    setStatus('error','Possible infinite loop');
    running=false;
    runBtn.style.display='';
    stopBtn.style.display='none';
    return;
  }

  try{
    pyodide.globals.set('_student_code', editor.value);
    await pyodide.runPythonAsync(`
import time as _t
_code_obj = _make_async(_student_code)
exec(_code_obj)

_t0 = _t.time()
_lc = [0]
def _watch(frame, event, arg):
    if event == 'line':
        _lc[0] += 1
        if (_lc[0] & 63) == 0:
            if _t.time() - _t0 > 3.0:
                sys.settrace(None)
                raise RuntimeError(
                    "Your program was stopped after 3 seconds.\\n"
                    "This usually means there is an infinite loop — a loop that never ends.\\n"
                    "Check your while loops: make sure the condition can eventually become False,\\n"
                    "or that you have a break statement inside."
                )
    return _watch

sys.settrace(_watch)
try:
    await _main()
finally:
    sys.settrace(None)
`);
  }catch(err){
    const msg=formatTraceback(String(err));
    appendOut(msg+'\n','err');
    setStatus('error','Error');
    running=false;
    runBtn.style.display='';
    stopBtn.style.display='none';
    const inp=outBody.querySelector('.inline-inp');
    if(inp) inp.remove();
    return;
  }

  if(running){
    setStatus('ready','Done');
    running=false;
    runBtn.style.display='';
    stopBtn.style.display='none';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────

(async()=>{
  try{
    pyodide=await loadPyodide();
    runBtn.textContent='Run \u25B6';
    runBtn.disabled=false;
    setStatus('ready','Python 3.11 ready');
    updateLnum();
    updateHighlight();
    const files=getFiles();
    const keys=Object.keys(files);
    if(keys.length){
      const latest=keys.sort((a,b)=>(files[b].updated||0)-(files[a].updated||0))[0];
      loadFile(latest);
    }
  }catch(e){
    setStatus('error','Failed to load runtime');
    appendOut('Could not load Python. Check your connection and refresh.\n','err');
  }
})();
</script>
